spring.application.name=jobmatch
server.port=8080

# ---- H2 Database (In-Memory Fallback for standalone demo) ----
spring.datasource.url=jdbc:h2:mem:credx;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ---- JPA / Hibernate ----
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# ---- JWT ----
jwt.secret=credx-hackathon-super-secret-key-change-me-please-0123456789
jwt.expiration-ms=604800000

# ---- CORS (Angular dev server) ----
app.cors.allowed-origins=http://localhost:4200
